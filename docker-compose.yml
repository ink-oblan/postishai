services:
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: postishai
      POSTGRES_USER: postishai
      POSTGRES_PASSWORD: postishai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postishai -d postishai"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postishai:postishai@db:5432/postishai?schema=public
      HUSKY: "0"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STORAGE_PATH: /app/storage
    command: sh -c "npm ci && npm run app:dev:docker"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postishai:postishai@db:5432/postishai?schema=public
      HUSKY: "0"
      STORAGE_PATH: /app/storage
    command: sh -c "npm ci && npx prisma generate && npm run worker:dev"
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  app_node_modules:
  worker_node_modules:
