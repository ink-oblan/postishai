services:
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: postishai
      POSTGRES_USER: postishai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postishai -d postishai"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postishai:${POSTGRES_PASSWORD}@db:5432/postishai?schema=public
      HUSKY: "0"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STORAGE_PATH: /app/storage
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_APPROVAL_CHAT_ID: ${TELEGRAM_APPROVAL_CHAT_ID:-}
    command: sh -c "npm ci && npm run app:dev:docker"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postishai:${POSTGRES_PASSWORD}@db:5432/postishai?schema=public
      HUSKY: "0"
      STORAGE_PATH: /app/storage
    command: sh -c "npm ci && npx prisma generate && npm run worker:dev"
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "npx", "tsx", "scripts/healthcheck-worker.ts"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  app_node_modules:
  worker_node_modules:
