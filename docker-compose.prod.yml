services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: !reset []
    volumes: !override
      - postgres_data:/var/lib/postgresql

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      target: prod
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
    command: ["node", "server.js"]
    ports: !override
      - "${APP_PORT:-3000}:3000"
    volumes: !override
      - ./storage:/app/storage
      - ./logs:/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      target: prod-build
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    command: sh -c "npm run worker:start 2>&1 | tee /logs/worker.log"
    volumes: !override
      - ./storage:/app/storage
      - ./logs:/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
