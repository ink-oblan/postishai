services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: !reset []
    volumes: !override
      - postgres_data:/var/lib/postgresql

  migrate:
    image: ${IMAGE_BASE:-ghcr.io/placeholder}/migrate:${IMAGE_TAG:-latest}
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://postishai:${POSTGRES_PASSWORD}@db:5432/postishai?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    image: ${IMAGE_BASE:-ghcr.io/placeholder}/app:${IMAGE_TAG:-latest}
    build:
      target: prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postishai:${POSTGRES_PASSWORD}@db:5432/postishai?schema=public
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_APPROVAL_CHAT_ID: ${TELEGRAM_APPROVAL_CHAT_ID:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
    command: ["node", "server.js"]
    ports: !override
      - "${APP_PORT:-3000}:3000"
    volumes: !override
      - ./storage:/app/storage
      - ./logs:/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    image: ${IMAGE_BASE:-ghcr.io/placeholder}/worker:${IMAGE_TAG:-latest}
    build:
      target: prod-build
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postishai:${POSTGRES_PASSWORD}@db:5432/postishai?schema=public
      NODE_ENV: production
    command: sh -c "npm run worker:start 2>&1 | tee /logs/worker.log"
    volumes: !override
      - ./storage:/app/storage
      - ./logs:/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
