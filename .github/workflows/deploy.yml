name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: prod
            image_suffix: app
          - target: migrate
            image_suffix: migrate
          - target: prod-build
            image_suffix: worker
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.image_suffix }}:latest
            ${{ env.IMAGE_BASE }}/${{ matrix.image_suffix }}:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}/${{ matrix.image_suffix }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_suffix }}

  deploy:
    name: Deploy production
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.ref_name }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          envs: IMAGE_BASE,IMAGE_TAG,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd /opt/postishai

            git fetch origin tag "$IMAGE_TAG"
            git checkout "$IMAGE_TAG"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_BASE="$IMAGE_BASE"
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull migrate app worker
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000 >/dev/null; then
                exit 0
              fi
              sleep 2
            done

            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 app
            exit 1
