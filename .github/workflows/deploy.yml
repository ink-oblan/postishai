name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images
        uses: docker/bake-action@v7
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          IMAGE_TAG: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        with:
          files: ./docker-bake.hcl

  deploy:
    name: Deploy production
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.ref_name }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          envs: IMAGE_BASE,IMAGE_TAG,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd /opt/postishai

            git fetch origin tag "$IMAGE_TAG"
            git checkout "$IMAGE_TAG"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_BASE="$IMAGE_BASE"
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull --quiet migrate app worker
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -a -f

            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000 >/dev/null; then
                exit 0
              fi
              sleep 2
            done

            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 migrate
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 app
            exit 1
